spring.application.name=${APP_NAME:eazystore}
#debug=${DEBUG:false}

logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=${LOG_LEVEL:INFO}
logging.file.name=${LOG_FILE_NAME:/Users/eazybytes/Desktop/logs/app.log}
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:eazystore}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

management.endpoint.health.show-details=always
management.endpoints.web.base-path=${ACTUATOR_BASE_PATH:/eazystore/actuator}
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:*}
# management.endpoints.web.exposure.exclude=beans,health
management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always

management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=${APP_DESCRIPTION:Backend Project for Eazy Store E-commerce application}
info.app.version=${APP_VERSION:1.0.0}
info.app.contact.email=${INFO_CONTACT_EMAIL:4TtG3@example.com}

contact.phone=${CONTACT_PHONE:}
contact.email=${CONTACT_EMAIL:dev@eazystore.com}
contact.address=${CONTACT_ADDRESS:123 Main Street, Anytown, USA}

eazystore.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

#spring.profiles.active=${SPRING_PROFILE:prod}
